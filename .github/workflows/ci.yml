jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build Docker image
      - name: Build Docker image
        run: docker build -t myimage:${{ github.sha }} .

      # Start Loki
      - name: Start Loki
        run: docker run -d --name loki -p 3100:3100 grafana/loki:2.9.0

      # Run Trivy scan and save JSON
      - name: Run Trivy scan
        run: |
          docker run --rm \
            -v $PWD:/app \
            aquasecurity/trivy:latest image --format json --output trivy-report.json myimage:${{ github.sha }}

      # Push Trivy JSON to Loki
      - name: Push Trivy JSON to Loki
        run: |
          curl -X POST http://localhost:3100/loki/api/v1/push \
            -H "Content-Type: application/json" \
            -d '{
              "streams": [
                {
                  "labels": "{job=\"trivy\"}",
                  "entries": [
                    {"ts": "'$(date --utc +%Y-%m-%dT%H:%M:%SZ)'",
                     "line": "'"$(cat trivy-report.json | jq -c .)"'"}
                  ]
                }
              ]
            }'
