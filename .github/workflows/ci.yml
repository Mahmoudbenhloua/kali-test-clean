name: CI/CD Build, Scan, and Push

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Set up Python (optional, for tests)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4️⃣ Run basic tests (optional)
      - name: Run tests
        run: pytest || echo "No tests found, skipping..."

      # 5️⃣ Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/kali-test:${{ github.sha }} .

      # 6️⃣ Start Loki (for pushing JSON logs)
      - name: Start Loki
        run: docker run -d --name loki -p 3100:3100 grafana/loki:2.9.0

      # 7️⃣ Run Trivy scan (JSON output for Grafana)
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/kali-test:${{ github.sha }}
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

        # 8️⃣ Run Grype scan (JSON output for Grafana)
      - name: Grype vulnerability scan
        uses: anchore/scan-action@v3
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/kali-test:${{ github.sha }}
          severity-cutoff: high
          fail-build: false
          output-format: json       
          path: grype-report.json

      # 9️⃣ Upload security scan reports as artifacts
      - name: Upload security scan reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            trivy-report.json
            grype-report.json

      # 🔟 Push Trivy JSON to Loki
      - name: Push Trivy JSON to Loki
        run: |
          sleep 15
          curl -X POST http://localhost:3100/loki/api/v1/push \
            -H "Content-Type: application/json" \
            -d '{
              "streams": [
                {
                  "labels": "{job=\"trivy\"}",
                  "entries": [
                    {"ts": "'$(date --utc +%Y-%m-%dT%H:%M:%SZ)'",
                     "line": "'"$(cat trivy-report.json | jq -c .)"'"}
                  ]
                }
              ]
            }'

      # 1️⃣1️⃣ Push Grype JSON to Loki
      - name: Push Grype JSON to Loki
        run: |
          curl -X POST http://localhost:3100/loki/api/v1/push \
            -H "Content-Type: application/json" \
            -d '{
              "streams": [
                {
                  "labels": "{job=\"grype\"}",
                  "entries": [
                    {"ts": "'$(date --utc +%Y-%m-%dT%H:%M:%SZ)'",
                     "line": "'"$(cat grype-report.json | jq -c .)"'"}
                  ]
                }
              ]
            }'

      # 1️⃣2️⃣ Log in to DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1️⃣3️⃣ Push Docker image (only if all scans pass)
      - name: Push Docker image
        if: success()
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/kali-test:${{ github.sha }}
